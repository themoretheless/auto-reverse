name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Format
        run: cargo fmt --check
      - name: Check GUI build
        run: cargo check
      - name: Check lean build
        run: cargo check --no-default-features
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Build and inspect app bundle
        run: scripts/build-app-bundle.sh
