[package]
name = "auto-reverse"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# Only platform/macos touches these; the pure core (config, device, input,
# scroll) compiles without any OS framework.
[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.10"
core-foundation-sys = "0.8"
core-graphics = { version = "0.25", features = ["highsierra"] }
